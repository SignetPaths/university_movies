<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: #000;
      }
      video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: none;
      }
      video.active {
        display: block;
      }
      #loader {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        z-index: 100;
        transition: opacity 0.5s ease;
      }
      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #loader-text {
        color: rgba(255, 255, 255, 0.7);
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 14px;
        letter-spacing: 0.05em;
      }
    </style>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <div id="loader-text">Loading 0 / 9</div>
    </div>

    <video class="active" src="video1.MP4" playsinline></video>
    <video src="video2.MP4" playsinline></video>
    <video src="video3.mov" playsinline></video>
    <video src="video4.MP4" playsinline></video>
    <video src="video5.MP4" playsinline></video>
    <video src="video6.MP4" playsinline></video>
    <video src="video7.MP4" playsinline></video>
    <video src="video8.MP4" playsinline></video>
    <video src="video9.MP4" playsinline></video>
    <script>
      const videos = Array.from(document.querySelectorAll("video"));
      const loader = document.getElementById("loader");
      const loaderText = document.getElementById("loader-text");
      let current = 0;

      // --- preload tracking ---
      let loadedCount = 0;
      const total = videos.length;

      function markLoaded() {
        loadedCount++;
        loaderText.textContent = `Loading ${loadedCount} / ${total}`;
        if (loadedCount >= total) startPlayback();
      }

      videos.forEach((v) => {
        v.preload = "auto";
        // canplaythrough = enough buffered to play start to finish
        if (v.readyState >= 4) {
          markLoaded();
        } else {
          v.addEventListener("canplaythrough", markLoaded, { once: true });
          // count errors as "done" so one bad file doesn't hang the loader
          v.addEventListener("error", markLoaded, { once: true });
        }
        v.load();
      });

      let started = false;
      function startPlayback() {
        if (started) return;
        started = true;
        loader.classList.add("hidden");
        videos[0].play();
      }

      // safety net: never hang forever
      setTimeout(startPlayback, 15000);

      // --- playback ---
      function show(i) {
        videos.forEach((v, idx) => {
          v.classList.toggle("active", idx === i);
          if (idx !== i) {
            v.pause();
            v.currentTime = 0;
          }
        });
        videos[i].play();
      }
      videos.forEach((v, idx) => {
        v.addEventListener("ended", () => {
          current = (idx + 1) % videos.length;
          show(current);
        });
      });

      // woosh back on press
      let rewindTimer = null;
      function startRewind() {
        const v = videos[current];
        v.pause();
        if (rewindTimer) clearInterval(rewindTimer);
        rewindTimer = setInterval(() => {
          v.currentTime = Math.max(0, v.currentTime - 0.06);
        }, 16);
      }
      function stopRewind() {
        if (rewindTimer) {
          clearInterval(rewindTimer);
          rewindTimer = null;
        }
        videos[current].play();
      }

      document.addEventListener("mousedown", startRewind);
      document.addEventListener("mouseup", stopRewind);
      document.addEventListener("touchstart", startRewind, { passive: true });
      document.addEventListener("touchend", stopRewind);
    </script>
  </body>
</html>
